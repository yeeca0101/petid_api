services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: petid_api
    restart: unless-stopped
    depends_on:
      qdrant:
        condition: service_started
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      TZ: ${TZ:-Asia/Seoul}
      LOG_TZ: ${LOG_TZ:-Asia/Seoul}
      BUSINESS_TZ: ${BUSINESS_TZ:-Asia/Seoul}
      DEVICE: ${DEVICE:-cpu}
      QDRANT_URL: http://qdrant:6333
      HF_CACHE_DIR: /app/weights
      STORAGE_DIR: /app/data
      REID_STORAGE_DIR: /app/data/reid
      VERIFICATION_STORAGE_DIR: /app/data/verification
      SHARED_STORAGE_DIR: /app/data/shared
      YOLO_WEIGHTS_PATH: ${YOLO_WEIGHTS_PATH:-/app/weights/yolo/yolo26x.pt}
      GOOGLE_DRIVE_URL: ${GOOGLE_DRIVE_URL:-}
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./weights:/app/weights
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  qdrant:
    image: qdrant/qdrant:latest
    container_name: petid_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

volumes:
  qdrant_storage:
