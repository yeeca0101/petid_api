services:
  api-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: petid_api_dev
    restart: unless-stopped
    depends_on:
      qdrant:
        condition: service_started
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      TZ: ${TZ:-Asia/Seoul}
      LOG_TZ: ${LOG_TZ:-Asia/Seoul}
      BUSINESS_TZ: ${BUSINESS_TZ:-Asia/Seoul}
      DEVICE: ${DEVICE:-cuda:0}
      QDRANT_URL: http://qdrant:6333
      HF_CACHE_DIR: /app/weights
      STORAGE_DIR: /app/data
      REID_STORAGE_DIR: /app/data/reid
      VERIFICATION_STORAGE_DIR: /app/data/verification
      SHARED_STORAGE_DIR: /app/data/shared
      YOLO_WEIGHTS_PATH: ${YOLO_WEIGHTS_PATH:-/app/weights/yolo/yolo26x.pt}
      GOOGLE_DRIVE_URL: ${GOOGLE_DRIVE_URL:-}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
    gpus:
      - driver: nvidia
        count: all
        capabilities: [gpu]
    ports:
      - "${API_DEV_PORT:-8001}:8000"
    volumes:
      - ./app:/app/app
      - ./for_admin:/app/for_admin
      - ./setup_scripts:/app/setup_scripts
      - ./data:/app/data
      - ./weights:/app/weights
      - ./.env:/app/.env:ro
      - ./requirements.txt:/app/requirements.txt:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  front-dev:
    image: nginx:1.27-alpine
    container_name: petid_front_dev
    restart: unless-stopped
    depends_on:
      api-dev:
        condition: service_started
    ports:
      - "${FRONT_DEV_PORT:-3001}:80"
    volumes:
      - ./for_admin:/usr/share/nginx/html:ro
      - ./dev/nginx.front-dev.conf:/etc/nginx/conf.d/default.conf:ro

  qdrant:
    image: qdrant/qdrant:latest
    container_name: petid_qdrant_dev
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage_dev:/qdrant/storage

volumes:
  qdrant_storage_dev:
